name: Build main

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 25 ]
      fail-fast: true

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Verify public API stays consumable
        # buildsystem-api-test is a downstream consumer compiled against buildsystem-api; a breaking API change
        # fails its compilation here.
        run: ./gradlew :buildsystem-api-test:compileJava